// 拖放事件处理
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, preventDefaults, false);
    document.body.addEventListener(eventName, preventDefaults, false);
});

// 高亮拖放区域
['dragenter', 'dragover'].forEach(eventName => {
    dropArea.addEventListener(eventName, highlight, false);
});

// 取消高亮
['dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, unhighlight, false);
});

// 处理文件拖放
dropArea.addEventListener('drop', handleDrop, false);

// 阻止默认行为
function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
}

// 高亮拖放区域
function highlight() {
    dropArea.classList.add('active');
}

// 取消高亮
function unhighlight() {
    dropArea.classList.remove('active');
}

// 处理拖放的文件
function handleDrop(e) {
    const dt = e.dataTransfer;
    const file = dt.files[0];
    
    if (file && file.type === 'application/pdf') {
        // 处理PDF文件
        handlePdfFile(file);
    } else {
        statusBar.textContent = '请拖放PDF文件';
    }
}

// 处理PDF文件的通用函数（重构原有的加载逻辑）
function handlePdfFile(file) {
    try {
        statusBar.textContent = '正在加载PDF文件...';
        const fileReader = new FileReader();
        
        fileReader.onload = async function() {
            try {
                const typedarray = new Uint8Array(this.result);
                pdfBytes = this.result;
                window.pdfBytes = this.result;
               
                pdfDoc = await pdfjsLib.getDocument({data: typedarray}).promise;
                await renderPDF();
                statusBar.textContent = `已加载PDF文件，共${pdfDoc.numPages}页`;
                
                // 隐藏拖放区域
                dropArea.style.display = 'none';
            } catch (error) {
                statusBar.textContent = '渲染PDF失败: ' + error.message;
                console.error('Error rendering PDF:', error);
            }
        };
        
        fileReader.readAsArrayBuffer(file);
    } catch (error) {
        statusBar.textContent = '加载PDF失败: ' + error.message;
        console.error('Error loading PDF:', error);
    }
}

// 修改原有的loadPDF函数，复用handlePdfFile
function loadPDF(e) {
    const file = e.target.files[0];
    if (file) {
        handlePdfFile(file);
    }
}

// 添加右键确认功能：当弹窗显示时，右键点击自动确认
document.addEventListener('contextmenu', function(e) {
    if (numberModal.style.display === 'flex') {
        e.preventDefault();
        if (window.currentEditId) {
            // 如果是编辑模式，执行编辑确认
            const annId = window.currentEditId;
            const annIndex = annotations.findIndex(ann => ann.id.toString() === annId.toString());
            if (annIndex !== -1) {
                const oldNumber = annotations[annIndex].number;
                const newNumber = parseInt(numberInput.value);
                if (isNaN(newNumber) || newNumber <= 0) {
                    statusBar.textContent = '请输入有效的正整数';
                    return;
                }

                const batchUpdate = document.getElementById('batchUpdate').checked;
                const delta = newNumber - oldNumber;

                if (batchUpdate && delta !== 0) {
                    annotations.forEach(ann => {
                        if (ann.number > oldNumber) {
                            ann.number += delta;
                        }
                    });
                }

                annotations[annIndex].number = newNumber;
                document.querySelectorAll('.circle-annotation').forEach(el => el.remove());
                annotations.forEach(ann => addAnnotationToPage(ann));
                
                numberModal.style.display = 'none';
                currentClickX = 0;
                currentClickY = 0;
                if (selectedAnnotation) {
                    selectedAnnotation.classList.remove('selected');
                    selectedAnnotation = null;
                }
                window.currentEditId = null;
                
                if (batchUpdate && delta !== 0) {
                    statusBar.textContent = `序号已从 ${oldNumber} 更新为 ${newNumber}，已批量更新所有大于 ${oldNumber} 的序号，变化量 ${delta > 0 ? '+' : ''}${delta}`;
                } else {
                    statusBar.textContent = `序号已更新为 ${newNumber}`;
                }
            }
        } else if (currentClickX !== 0 && currentClickY !== 0) {
            // 如果是添加模式，执行添加确认
            addAnnotation();
        }
        return false;
    }
});

// 删除按钮点击事件监听器
deleteBtn.addEventListener('click', () => {

});

// 所有页面容器的点击事件（确保只绑定一次）
document.querySelector('.pdf-container').addEventListener('click', (e) => {
    if (e.target.classList.contains('circle-annotation')) {
        if (isDeleteMode) {
            // 直接删除
            e.target.remove();
            const annId = e.target.id.replace('ann-', '');
            annotations = annotations.filter(ann => ann.id.toString() !== annId.toString());
            statusBar.textContent = `序号 ${annId} 已删除`;
            return; // 阻止后续逻辑
        }

        // 非删除模式：进入编辑
        if (selectedAnnotation) {
            selectedAnnotation.classList.remove('selected');
        }
        e.target.classList.add('selected');
        selectedAnnotation = e.target;
        window.currentEditId = e.target.id.replace('ann-', '');
        numberInput.value = annotations.find(ann => ann.id.toString() === selectedAnnotation.id.replace('ann-', '')).number;

    }

            currentScale = parseFloat(pdfScale.value) / 100;
            pdfScaleValue.textContent = `${Math.round(currentScale * 100)}%`;
            if (pdfDoc) {
                renderPDF(); // 重新渲染PDF以应用新的缩放比例
            }
        });
        
        // 鼠标滚轮缩放控制 - 修复只缩放PDF不缩放页面
        document.addEventListener('wheel', (e) => {
            // 检查是否按下了Ctrl键且有PDF文档加载
            if (e.ctrlKey && pdfDoc) {
                // 阻止浏览器默认的缩放行为
                e.preventDefault();
                
                // 根据滚轮方向调整缩放比例
                if (e.deltaY < 0) {
                    // 向上滚动，放大
                    currentScale = Math.min(currentScale + 0.1, 3); // 最大缩放3倍，和滑块范围保持一致
                } else {
                    // 向下滚动，缩小
                    currentScale = Math.max(currentScale - 0.1, 0.5); // 最小缩放0.5倍，和滑块范围保持一致
                }
                
                // 更新滑块和显示值
                pdfScale.value = Math.round(currentScale * 100); // 修复：需要转换为百分比数值
                pdfScaleValue.textContent = `${Math.round(currentScale * 100)}%`;
                
                // 重新渲染PDF
                renderPDF();
                
                // 更新状态栏
                statusBar.textContent = `PDF缩放已调整为 ${Math.round(currentScale * 100)}%`;
            }
        }, { passive: false }); // passive: false 允许调用preventDefault
        
        // 额外阻止浏览器默认快捷键缩放
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '0')) || 
                (e.metaKey && (e.key === '+' || e.key === '-' || e.key === '0'))) {
                e.preventDefault();
            }
        });
        
        // 添加识别纸张尺寸的函数
        function identifyPaperSize(width, height) {
            const minDim = Math.min(width, height);
            const maxDim = Math.max(width, height);
            
            // A4 近似 595 × 842 点
            if (Math.abs(width - 595) < 20 && Math.abs(height - 842) < 20) return 'A4';
            if (Math.abs(width - 842) < 20 && Math.abs(height - 595) < 20) return 'A4 横版';
            
            // A3 近似 842 × 1190 点
            if (Math.abs(width - 842) < 20 && Math.abs(height - 1190) < 20) return 'A3';
            if (Math.abs(width - 1190) < 20 && Math.abs(height - 842) < 20) return 'A3 横版';
            
            // B5 近似 516 × 729 点
            if (Math.abs(width - 516) < 20 && Math.abs(height - 729) < 20) return 'B5';
            if (Math.abs(width - 729) < 20 && Math.abs(height - 516) < 20) return 'B5 横版';
            
            return `自定义(${Math.round(width)}×${Math.round(height)})`;
        }

        async function renderPDF() {
            if (!pdfDoc) {
                statusBar.textContent = 'PDF文档未加载';
                return;
            }
            
            pdfContainer.innerHTML = '';
            
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                try {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({scale: 1.0});
                    const rotation = page.rotate || 0;
                    let originalWidth, originalHeight;
                    
                    if ([90, 270].includes(rotation)) {
                        originalWidth = viewport.height;
                        originalHeight = viewport.width;
                    } else {
                        originalWidth = viewport.width;
                        originalHeight = viewport.height;
                    }
                    
                    // 识别图幅尺寸（单位是点，1英寸=72点，A4是210mm×297mm ≈ 595×842点）
                    let paperSize = identifyPaperSize(originalWidth, originalHeight);
                    console.log(`页面 ${i}: 尺寸 ${Math.round(originalWidth)} × ${Math.round(originalHeight)} 点，识别为${paperSize}，旋转角度 ${rotation} 度`);
                    
                    // 使用当前缩放重新获取viewport
                    const scaledViewport = page.getViewport({scale: currentScale});
                    
                    const container = document.createElement('div');
                    container.className = 'pdf-page';
                    container.dataset.pageNumber = i;
                    container.style.width = `${scaledViewport.width}px`;
                    container.style.height = `${scaledViewport.height}px`;
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    if (!context) {
                        throw new Error('无法获取canvas 2D上下文');
                    }
                    
                    canvas.height = scaledViewport.height;
                    canvas.width = scaledViewport.width;
                    
                    container.appendChild(canvas);
                    pdfContainer.appendChild(container);
                    
                    const renderContext = {
                        canvasContext: context,
                        viewport: scaledViewport
                    };
                    
                    await page.render(renderContext).promise;
   
                    // 添加点击事件监听器
                    container.addEventListener('click', (e) => {
                        if (isAddingMode) {
                            const rect = container.getBoundingClientRect();
                            // 修正：将点击坐标除以当前缩放比例，获取原始PDF坐标
                            currentClickX = (e.clientX - rect.left) / currentScale;
                            currentClickY = (e.clientY - rect.top) / currentScale;
                            currentPageNumber = parseInt(container.dataset.pageNumber);
                            
                            numberInput.value = annotations.length + 1;
                            numberModal.style.display = 'flex';
                            numberInput.focus();
                            
                            statusBar.textContent = '请输入序号数字，按回车键确认';
                        }
                    });
                    
                } catch (error) {
                    statusBar.textContent = `渲染第${i}页失败: ${error.message}`;
                    console.error(`Error rendering page ${i}:`, error);
                }
            }
            
            // 重新添加已有的标注
            annotations.forEach(ann => addAnnotationToPage(ann));
        }
        
        function toggleAddMode() {
            if (!pdfDoc) {
                statusBar.textContent = '请先加载PDF文件';
                return;
            }
            
            isAddingMode = !isAddingMode;
            
            // 如果进入添加模式，自动退出删除模式
            if (isAddingMode) {
                if (isDeleteMode) {
                    isDeleteMode = false;
                    deleteBtn.classList.remove('active');
                    deleteBtn.textContent = '🗑️ 删除序号';
                }
                
                addIndicator.classList.add('active');
                toggleAddBtn.classList.remove('start');
                toggleAddBtn.classList.add('stop');
                toggleAddBtn.textContent = '✅ 添加模式';
                toggleAddBtn.insertBefore(addIndicator, toggleAddBtn.firstChild);
                document.body.classList.add('adding-mode');
                
                document.querySelectorAll('.pdf-page').forEach(page => {
                    page.style.cursor = 'crosshair';
                });
                
                statusBar.textContent = '点击PDF页面任意位置添加序号（可连续添加）';
            } else {
                stopAddMode();
            }
        }
        
        function stopAddMode() {
            isAddingMode = false;
            addIndicator.classList.remove('active');
            toggleAddBtn.classList.remove('stop');
            toggleAddBtn.classList.add('start');
            toggleAddBtn.textContent = '开始添加序号';
            toggleAddBtn.insertBefore(addIndicator, toggleAddBtn.firstChild);
            document.body.classList.remove('adding-mode');
            
            document.querySelectorAll('.pdf-page').forEach(page => {
                page.style.cursor = 'default';
            });
            
            statusBar.textContent = '已停止添加模式';
        }
        
        function cancelAddAnnotation() {
            numberModal.style.display = 'none';
            // 关键修复：取消时也清空点击位置信息
            currentClickX = 0;
            currentClickY = 0;
            window.currentEditId = null;
            statusBar.textContent = '已取消添加';
        }
        
function addAnnotation() {
    if (currentClickX === 0 || currentClickY === 0) {
        statusBar.textContent = '请先在PDF页面上点击选择位置';
        return;
    }
    const number = parseInt(numberInput.value);
    if (isNaN(number) || number <= 0) {
        statusBar.textContent = '请输入有效的正整数';
        return;
    }
    const borderColor = document.getElementById('circleBorderColor').value;
    const fillColor = document.getElementById('circleFillColor').value;
    const textColor = document.getElementById('textColor').value;
    const shape = document.getElementById('shapeType').value;

    const ann = {
        id: Date.now() + Math.random(),
        page: currentPageNumber,
        x: currentClickX,
        y: currentClickY,
        number: number,
        size: parseInt(circleSize.value),
        textSize: parseInt(textSize.value),
        borderColor: borderColor,
        fillColor: fillColor,
        textColor: textColor,
        shape: shape
    };
    annotations.push(ann);
    addAnnotationToPage(ann);
    numberModal.style.display = 'none';
    currentClickX = 0;
    currentClickY = 0;
    statusBar.textContent = `已添加序号 ${number}，可继续添加或点击"停止添加"`;
}
        
// 在 addAnnotationToPage 函数中，确保不要重复绑定点击事件
function addAnnotationToPage(ann) {
    const pageContainer = document.querySelector(`.pdf-page[data-page-number="${ann.page}"]`);
    if (!pageContainer) {
        statusBar.textContent = `未找到第${ann.page}页`;
        return;
    }
    const existingAnn = document.getElementById(`ann-${ann.id}`);
    if (existingAnn) {
        existingAnn.remove();
    }
    const annElement = document.createElement('div');
    annElement.className = `circle-annotation shape-${ann.shape || 'circle'}`;
    annElement.id = `ann-${ann.id}`;
    // 根据当前缩放比例调整位置和大小
    annElement.style.left = `${ann.x * currentScale}px`;
    annElement.style.top = `${ann.y * currentScale}px`;
    annElement.style.width = `${ann.size * currentScale}px`;
    annElement.style.height = `${ann.size * currentScale}px`;
    annElement.style.fontSize = `${ann.textSize * currentScale}px`;
    
    // 设置颜色
    const shape = ann.shape || 'circle';
    annElement.style.borderColor = ann.borderColor || '#000000';
    annElement.style.backgroundColor = ann.fillColor || '#FFFFFF';
    annElement.style.color = ann.textColor || '#000000';
    annElement.style.borderWidth = '2px';
    annElement.style.borderStyle = 'solid';
    
    annElement.textContent = ann.number;

    // 不要在这里添加点击事件，因为已经在全局绑定过了
    pageContainer.appendChild(annElement);
}

async function saveAsPDF() {
    if (!pdfDoc) {
        statusBar.textContent = '请先加载PDF文件';
        return;
    }
    if (!window.pdfBytes) {
        statusBar.textContent = 'PDF数据未正确加载';
        return;
    }
    try {
        statusBar.textContent = '正在准备PDF生成...';

        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const pdfDocOrig = await PDFDocument.load(window.pdfBytes);
        const pages = pdfDocOrig.getPages();
        // 嵌入Helvetica加粗字体
        const helveticaBold = await pdfDocOrig.embedFont(StandardFonts.HelveticaBold);

        // 处理每个页面的标注
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            // 获取pdf.js页面以获取正确的尺寸信息
            const pdfJsPage = await pdfDoc.getPage(i);
            const viewport = pdfJsPage.getViewport({scale: 1.0}); // 使用1.0缩放获取原始尺寸
            
            // 获取HTML页面容器
            const pageContainer = document.querySelector(`.pdf-page[data-page-number="${i}"]`);
            if (!pageContainer) continue;
            
            // 获取PDF页面的原始尺寸
            const pdfPage = pages[i - 1];
            if (!pdfPage) continue;
            
            const { width: pdfPageWidth, height: pdfPageHeight } = pdfPage.getSize();
            
            // 获取PDF页面的旋转角度
            const rotation = pdfJsPage.rotate || 0;
            
            // 计算精确的缩放比例（关键修正）
            let scaleX, scaleY;
            if ([90, 270].includes(rotation)) {
                // 横向页面：宽高互换
                scaleX = pdfPageHeight / viewport.width;
                scaleY = pdfPageWidth / viewport.height;
            } else {
                // 纵向页面
                scaleX = pdfPageWidth / viewport.width;
                scaleY = pdfPageHeight / viewport.height;
            }
            
            // 处理这一页的所有标注
            const pageAnnotations = annotations.filter(ann => ann.page === i);
            
            pageAnnotations.forEach(ann => {
                // 将标注坐标转换为PDF坐标（关键修正）
                let xInPdf, yInPdf;
                
                // 根据旋转角度调整坐标转换
                switch(rotation) {
                    case 0:
                        // 正常纵向页面
                        xInPdf = ann.x * scaleX;
                        yInPdf = pdfPageHeight - ann.y * scaleY;
                        break;
                    case 90:
                        // 顺时针旋转90度
                        xInPdf = ann.y * scaleY;
                        yInPdf = ann.x * scaleX;
                        break;
                    case 180:
                        // 旋转180度
                        xInPdf = pdfPageWidth - ann.x * scaleX;
                        yInPdf = ann.y * scaleY;
                        break;
                    case 270:
                        // 顺时针旋转270度
                        xInPdf = pdfPageHeight - ann.y * scaleY;
                        yInPdf = pdfPageWidth - ann.x * scaleX;
                        break;
                    default:
                        xInPdf = ann.x * scaleX;
                        yInPdf = pdfPageHeight - ann.y * scaleY;
                }
                
                // 大小转换
                const textSizeInPdf = ann.textSize * Math.min(scaleX, scaleY);
                const shapeSizeInPdf = ann.size * Math.min(scaleX, scaleY);
                const halfSize = shapeSizeInPdf / 2;
                const borderWidth = Math.max(0.5, textSizeInPdf * 0.1);
                const borderColorRGB = rgb(...hexToRgb(ann.borderColor || '#000000'));
                const fillColorRGB = rgb(...hexToRgb(ann.fillColor || '#FFFFFF'));
                
                // 绘制不同形状
                const shape = ann.shape || 'circle';
                switch(shape) {
                    case 'circle':
                        pdfPage.drawCircle({
                            x: xInPdf,
                            y: yInPdf,
                            size: halfSize,
                            borderColor: borderColorRGB,
                            borderWidth: borderWidth,
                            color: fillColorRGB
                        });
                        break;
                    case 'square':
                        pdfPage.drawRectangle({
                            x: xInPdf - halfSize,
                            y: yInPdf - halfSize,
                            width: shapeSizeInPdf,
                            height: shapeSizeInPdf,
                            borderColor: borderColorRGB,
                            borderWidth: borderWidth,
                            color: fillColorRGB
                        });
                        break;
                }

                // 绘制文本（根据页面旋转调整文本方向）
                const text = ann.number.toString();
                const textWidthEstimate = textSizeInPdf * ann.number.toString().length * 0.55;
                // 调整基线偏移，使文本垂直居中
                const textBaselineOffset = textSizeInPdf * 0.3; // 略微减小基线偏移
                
                switch(rotation) {
                    case 90:
                        console.log(`页面旋转角度:90度`);
                        pdfPage.drawText(text, {
                            x: xInPdf + textWidthEstimate / 2,
                            y: yInPdf - textWidthEstimate / 2,
                            size: textSizeInPdf,
                            color: rgb(...hexToRgb(ann.textColor || '#000000')),
                            rotate: { type: 'degrees', angle: 90 },
                            font: helveticaBold
                        });
                        break;
                    case 180:
                        pdfPage.drawText(text, {
                            x: xInPdf - textWidthEstimate / 2,
                            y: yInPdf + textBaselineOffset,
                            size: textSizeInPdf,
                            color: rgb(...hexToRgb(ann.textColor || '#000000')),
                            rotate: { type: 'degrees', angle: 180 },
                            font: helveticaBold
                        });
                        break;
                    case 270:
                        pdfPage.drawText(text, {
                            x: xInPdf + textBaselineOffset,
                            y: yInPdf + textWidthEstimate / 2,
                            size: textSizeInPdf,
                            color: rgb(...hexToRgb(ann.textColor || '#000000')),
                            rotate: { type: 'degrees', angle: 270 },
                            font: helveticaBold
                        });
                        break;
                    default:
                        pdfPage.drawText(text, {
                            x: xInPdf - textWidthEstimate / 2,
                            y: yInPdf - textBaselineOffset,
                            size: textSizeInPdf,
                            color: rgb(...hexToRgb(ann.textColor || '#000000')),
                            font: helveticaBold
                        });
                }
                // 删除了重复的switch语句，避免文字绘制两遍 - 修复完成
            });
        }

        const pdfBytes = await pdfDocOrig.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '已标记的文档.pdf';
        link.click();
        statusBar.textContent = 'PDF保存成功！';
    } catch (error) {
        statusBar.textContent = 'PDF生成失败: ' + error.message;
        console.error('Error generating PDF:', error);
    }
}

// 辅助函数用于将十六进制颜色转换为RGB
function hexToRgb(hex) {
    // Remove the hash symbol if present
    hex = hex.replace(/^#/, '');
    // 如果是3位十六进制，扩展为6位
    if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
    }
    // Parse r, g, b values from hex string
    let bigint = parseInt(hex, 16);
    let r = (bigint >> 16) & 255;
    let g = (bigint >> 8) & 255;
    let b = bigint & 255;
    return [r / 255, g / 255, b / 255];
}
